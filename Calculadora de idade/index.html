<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMCs</title>
    <link rel="stylesheet" href="styles.css">
    <script src="./script.js" defer></script>
</head>
<body>
<main>
    <h1>Calculadora de idade</h1>
    <section>
        <h2>Cadastro de informações</h2>
        <form method="post" id="form-cadastro">

            <div class="campo-form">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Insira seu Nome">
            </div>
            <div class="campo-form">
                <label for="dia">Dia</label>
                <input type="number" id="dia" placeholder="Insira seu dia de nascimento">
            </div>
            <div class="campo-form">
                <label for="mes">Mes</label>
                <input type="number" form id="mes" placeholder="Insira seu mes de nascimento">
            </div>
            <div class="campo-form">
                <label for="ano">Ano</label>
                <input type="number" id="ano" placeholder="Insira seu ano de nascimento">
            </div>

            <div class="conjunto-botoes">
                <button type="reset">Limpar Formulário</button>
                <button type="submit" onclick="calcularIdade()">Calcular</button>
            </div>
        </form>
    </section>

    <section>
        <h2>Idade Calculada</h2>
        <table>
            <caption></caption>
            <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>Faixa Etaria</th>
                <th>Data Cadastro</th>
            </tr>
            </thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
        <button class="botao-tabela" onclick="deletarRegistros()">Limpar Registros</button>
    </section>
</main>
</body>
</html>
